name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (leave empty for auto CalVer YYYY.M.D)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  quality:
    uses: ./.github/workflows/lint-test.yml
    with:
      python-versions: '["3.12"]'    # CI already covers the full matrix

  release:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0              # needed so git tag -l sees all tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="$(date +%Y.%-m.%-d)"
          fi
          if git tag -l "v${VER}" | grep -q .; then
            echo "::error::Tag v${VER} already exists"
            exit 1
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VER}"

      - name: Bump project version
        run: |
          VER="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"${VER}\"/" pyproject.toml

      - name: Commit and tag
        run: |
          VER="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "release: v${VER}"
          fi
          git tag "v${VER}"
          git push origin master --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.version }}"
          gh release create "v${VER}" \
            --title "v${VER}" \
            --generate-notes
