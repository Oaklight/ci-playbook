repos:
  # ── Ruff: lint + format ──────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Local hooks (system tools) ────────────────────────────────────────────
  # These require ty to be installed in your active environment.
  # Run: pip install -e ".[dev]"  (or conda activate <env>)

  - repo: local
    hooks:
      - id: ty
        name: ty check
        description: Type check with ty.
        entry: ty check
        language: system
        pass_filenames: false
        require_serial: true
        types: [python]

  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v5.1.0
    hooks:
      - id: complexipy
        files: ^src/
        exclude: ^src/_vendor/
        args: [-mx, "20"]
