repos:
  # ── Ruff: lint + format ──────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Local hooks (system tools) ────────────────────────────────────────────
  # These require ty and complexipy to be installed in your active environment.
  # Run: pip install -e ".[dev]"  (or conda activate <env>)

  - repo: local
    hooks:
      - id: ty
        name: ty check
        description: Type check with ty.
        entry: ty check
        language: system
        pass_filenames: false
        require_serial: true
        types: [python]

      - id: complexipy
        name: complexipy (complexity check)
        entry: complexipy src/          # adjust path as needed
        language: system
        pass_filenames: false
        always_run: true
